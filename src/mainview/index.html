<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>slAIdo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #app {
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: 100vh;
      height: 100vh;
      overflow: hidden;
    }

    /* grid 子要素の min-content 暗黙制約で row が膨張するのを防ぐ */
    #chat-pane, #preview-pane {
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    /* 左ペイン: チャット */
    #chat-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d2d4e;
      background: #16213e;
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2d2d4e;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #a0c4ff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    #chat-header-title {
      flex: 1;
    }

    .chat-header-link {
      margin-left: auto;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0;
      color: #888;
      text-decoration: underline;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 4px 6px;
      font-family: inherit;
    }

    .chat-header-link:hover {
      color: #a0c4ff;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    .message.user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #2d2d4e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      background: #4a1a1a;
      color: #ff8080;
      align-self: stretch;
    }

    /* T013: assistant メッセージ内の block 群 */
    .message.assistant {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .block-text {
      white-space: pre-wrap;
      line-height: 1.5;
    }

    details.block-reasoning {
      border-left: 2px solid transparent;
      padding-left: 6px;
      transition: border-color 0.15s;
    }

    details.block-reasoning[open] {
      border-left-color: #a0c4ff;
    }

    details.block-reasoning > summary {
      cursor: pointer;
      color: #888;
      font-size: 12px;
      list-style: none;
      user-select: none;
    }

    details.block-reasoning > summary::-webkit-details-marker {
      display: none;
    }

    details.block-reasoning > summary::before {
      content: "▸ ";
      display: inline-block;
      transition: transform 0.15s;
    }

    details.block-reasoning[open] > summary::before {
      content: "▾ ";
    }

    details.block-reasoning > .reasoning-text {
      margin-top: 4px;
      padding: 6px 8px;
      background: rgba(160, 196, 255, 0.06);
      border-radius: 4px;
      font-size: 13px;
      white-space: pre-wrap;
      color: #aab1bf;
    }

    .block-tool-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 13px;
      color: #aab1bf;
    }

    .block-tool-status[data-state="running"]::before,
    .block-tool-status[data-state="pending"]::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 2px solid #888;
      border-top-color: #a0c4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .block-tool-status[data-state="completed"] {
      color: #7fc97f;
      transition: opacity 0.3s 1.5s;
      opacity: 0.65;
    }

    .block-tool-status[data-state="completed"]::before {
      content: "✓";
      font-weight: 700;
    }

    .block-tool-status[data-state="error"] {
      color: #ff8080;
      background: rgba(255, 128, 128, 0.08);
    }

    .block-tool-status[data-state="error"]::before {
      content: "✗";
      font-weight: 700;
    }

    /* T020: Markdown(GFM) レンダリング用スタイル.
       assistant の text/reasoning block と #seed-display にだけ効かせる. */

    .block-text h1,
    .block-text h2,
    .block-text h3,
    .reasoning-text h1,
    .reasoning-text h2,
    .reasoning-text h3,
    #seed-display h1,
    #seed-display h2,
    #seed-display h3 {
      margin: 8px 0 4px;
      line-height: 1.3;
      font-weight: 600;
    }
    .block-text h1, .reasoning-text h1, #seed-display h1 { font-size: 18px; }
    .block-text h2, .reasoning-text h2, #seed-display h2 { font-size: 16px; }
    .block-text h3, .reasoning-text h3, #seed-display h3 { font-size: 14px; }

    .block-text p,
    .reasoning-text p,
    #seed-display p {
      margin: 4px 0;
    }

    .block-text ul,
    .block-text ol,
    .reasoning-text ul,
    .reasoning-text ol,
    #seed-display ul,
    #seed-display ol {
      margin: 4px 0;
      padding-left: 20px;
    }

    .block-text li,
    .reasoning-text li,
    #seed-display li {
      margin: 2px 0;
    }

    .block-text blockquote,
    .reasoning-text blockquote,
    #seed-display blockquote {
      margin: 4px 0;
      padding: 2px 8px;
      border-left: 3px solid #2d2d4e;
      color: #aab1bf;
    }

    .block-text code,
    .reasoning-text code,
    #seed-display code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.92em;
      padding: 1px 4px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 3px;
    }

    .block-text pre,
    .reasoning-text pre,
    #seed-display pre {
      margin: 6px 0;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }

    .block-text pre code,
    .reasoning-text pre code,
    #seed-display pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      font-size: inherit;
    }

    .block-text table,
    .reasoning-text table,
    #seed-display table {
      border-collapse: collapse;
      margin: 6px 0;
      font-size: 13px;
    }

    .block-text th,
    .block-text td,
    .reasoning-text th,
    .reasoning-text td,
    #seed-display th,
    #seed-display td {
      border: 1px solid #2d2d4e;
      padding: 4px 8px;
      text-align: left;
    }

    .block-text th,
    .reasoning-text th,
    #seed-display th {
      background: rgba(160, 196, 255, 0.08);
    }

    .block-text a,
    .reasoning-text a,
    #seed-display a {
      color: #a0c4ff;
      text-decoration: underline;
    }

    /* GFM tasklist (- [x] / - [ ]) */
    .block-text input[type="checkbox"],
    .reasoning-text input[type="checkbox"],
    #seed-display input[type="checkbox"] {
      margin-right: 4px;
      pointer-events: none; /* 表示のみ. 状態変更は不可 */
    }

    .block-text hr,
    .reasoning-text hr,
    #seed-display hr {
      border: none;
      border-top: 1px solid #2d2d4e;
      margin: 8px 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .permission-prompt {
      background: #3a2a14;
      border: 1px solid #ffd166;
      color: #ffe2a8;
      padding: 10px 12px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
    }

    .permission-prompt[data-status="user-allowed"],
    .permission-prompt[data-status="user-denied"] {
      opacity: 0.45;
    }

    .permission-prompt-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .permission-prompt button {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid #ffd166;
      background: transparent;
      color: #ffe2a8;
      cursor: pointer;
      font-size: 12px;
    }

    .permission-prompt button[data-action="allow"] {
      background: #ffd166;
      color: #1a1a2e;
    }

    .permission-prompt button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .auto-permission-log {
      font-size: 11px;
      color: #777;
      padding: 2px 8px;
    }

    .retry-btn {
      margin-left: 8px;
      padding: 2px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #ff8080;
      background: transparent;
      color: #ff8080;
      cursor: pointer;
    }

    /* phase 切替 (R-1 + T019). data-phase: loading | seed | interview | rubric-edit | chat */
    body[data-phase="loading"] #seed-area,
    body[data-phase="loading"] #chat-input-area,
    body[data-phase="loading"] #interview-pane,
    body[data-phase="loading"] #rubric-edit-pane {
      display: none;
    }

    body[data-phase="seed"] #chat-input-area,
    body[data-phase="seed"] #interview-pane,
    body[data-phase="seed"] #rubric-edit-pane {
      display: none;
    }

    body[data-phase="interview"] #seed-area,
    body[data-phase="interview"] #chat-input-area,
    body[data-phase="interview"] #rubric-edit-pane {
      display: none;
    }

    body[data-phase="rubric-edit"] #seed-area,
    body[data-phase="rubric-edit"] #chat-input-area,
    body[data-phase="rubric-edit"] #interview-pane {
      display: none;
    }

    body[data-phase="chat"] #seed-area,
    body[data-phase="chat"] #interview-pane,
    body[data-phase="chat"] #rubric-edit-pane {
      display: none;
    }

    /* タブ: チャット / シード切替。チャットモード時のみ表示 */
    #chat-tabs {
      display: flex;
      border-bottom: 1px solid #2d2d4e;
      flex-shrink: 0;
    }

    body[data-phase="seed"] #chat-tabs,
    body[data-phase="loading"] #chat-tabs,
    body[data-phase="interview"] #chat-tabs,
    body[data-phase="rubric-edit"] #chat-tabs {
      display: none;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      color: #888;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 10px 16px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: #a0c4ff;
    }

    .tab-btn.active {
      color: #a0c4ff;
      border-bottom-color: #a0c4ff;
    }

    /* タブで chat-messages / seed-display を排他切替 */
    #chat-pane[data-active-tab="seed"] #chat-messages,
    #chat-pane[data-active-tab="seed"] #dev-raw-trail {
      display: none;
    }

    #chat-pane:not([data-active-tab="seed"]) #seed-display {
      display: none;
    }

    #seed-display {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.6;
      color: #c0c8d4;
      background: #0d0d1a;
    }

    #seed-display.empty {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-style: italic;
    }

    /* dev トグル */
    #dev-raw-trail {
      border-top: 1px dashed #2d2d4e;
      padding: 8px 12px;
      max-height: 220px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.25);
    }

    #dev-raw-trail-title {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    #dev-raw-trail details {
      font-size: 11px;
      color: #888;
      margin-bottom: 2px;
    }

    #dev-raw-trail pre {
      margin: 4px 0 0 12px;
      padding: 4px;
      font-size: 10px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      max-height: 180px;
      overflow: auto;
    }

    #dev-indicator {
      font-size: 10px;
      color: #ffd166;
      border: 1px solid #ffd166;
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 8px;
    }

    body:not([data-dev="1"]) #dev-raw-trail,
    body:not([data-dev="1"]) #dev-indicator {
      display: none;
    }

    /* abort ボタン */
    #abort-btn {
      padding: 8px 16px;
      background: #4a1a1a;
      color: #ff8080;
      border: 1px solid #ff8080;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #abort-btn:hover {
      background: #6a2424;
    }

    #abort-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #seed-area {
      padding: 12px 16px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1 1 auto;
      min-height: 0;
    }

    #seed-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #preset-select-wrap {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #preset-select-wrap.hidden {
      display: none;
    }

    #preset-select {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      color: #c0c8d4;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
      font-family: inherit;
    }

    #generate-skip-link {
      align-self: flex-end;
      background: transparent;
      border: none;
      color: #888;
      font-size: 11px;
      text-decoration: underline;
      cursor: pointer;
      padding: 2px 4px;
      font-family: inherit;
    }

    #generate-skip-link:hover {
      color: #a0c4ff;
    }

    /* interview pane */
    #interview-pane {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #16213e;
    }

    .interview-progress {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .interview-question {
      background: #2d2d4e;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: #e0e0e0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .interview-question.loading {
      color: #888;
      font-style: italic;
    }

    .interview-history {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 8px;
    }

    .interview-history-item {
      font-size: 12px;
      color: #aab1bf;
    }

    .interview-history-item .q {
      color: #888;
    }

    .interview-history-item .a {
      color: #c0c8d4;
      padding-left: 12px;
      white-space: pre-wrap;
    }

    #interview-answer-input {
      width: 100%;
      min-height: 80px;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 12px;
      resize: vertical;
      font-family: inherit;
    }

    #interview-answer-input:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    .interview-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #interview-answer-submit {
      flex: 1;
      padding: 10px;
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #interview-answer-submit:disabled {
      background: #2d2d4e;
      color: #555;
      cursor: not-allowed;
    }

    #interview-cancel-btn {
      background: transparent;
      color: #888;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    #interview-cancel-btn:hover {
      color: #ff8080;
      border-color: #ff8080;
    }

    .interview-error {
      background: #4a1a1a;
      color: #ff8080;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
    }

    .interview-error.hidden {
      display: none;
    }

    /* rubric-edit pane */
    #rubric-edit-pane {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #16213e;
    }

    .rubric-edit-title {
      font-size: 13px;
      color: #a0c4ff;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .rubric-edit-desc {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .rubric-axis {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rubric-axis label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .rubric-axis input[type="text"],
    .rubric-axis input[type="number"],
    .rubric-axis textarea,
    .rubric-axis select {
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 6px 10px;
      font-family: inherit;
    }

    .rubric-axis textarea {
      min-height: 50px;
      resize: vertical;
    }

    .rubric-axis input:focus,
    .rubric-axis textarea:focus,
    .rubric-axis select:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    .rubric-axis-anti-patterns {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rubric-axis-anti-patterns .item {
      display: flex;
      gap: 4px;
    }

    .rubric-axis-anti-patterns input[type="text"] {
      flex: 1;
    }

    .rubric-axis-anti-patterns button {
      background: transparent;
      border: 1px solid #2d2d4e;
      color: #888;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }

    .rubric-axis-anti-patterns button:hover {
      color: #ff8080;
      border-color: #ff8080;
    }

    .rubric-axis-anti-patterns .add-btn {
      align-self: flex-start;
      color: #a0c4ff;
    }

    .rubric-axis-anti-patterns .add-btn:hover {
      color: #bfd7ff;
      border-color: #a0c4ff;
    }

    .rubric-history {
      border-top: 1px dashed #2d2d4e;
      padding-top: 8px;
      margin-top: 4px;
    }

    .rubric-history summary {
      font-size: 11px;
      color: #888;
      cursor: pointer;
    }

    .rubric-history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
      font-size: 12px;
      color: #aab1bf;
    }

    .rubric-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .rubric-actions button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    #rubric-generate-btn {
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
    }

    #rubric-save-and-generate-btn {
      background: transparent;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
    }

    #rubric-cancel-btn {
      background: transparent;
      color: #888;
      border: 1px solid #2d2d4e;
      flex: 0 0 80px;
    }

    #seed-input {
      width: 100%;
      flex: 1 1 auto;
      min-height: 120px;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      font-family: inherit;
    }

    #seed-input:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    #seed-input::placeholder {
      color: #555;
    }

    #generate-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #generate-btn:hover {
      background: #bfd7ff;
    }

    #generate-btn:disabled {
      background: #2d2d4e;
      color: #555;
      cursor: not-allowed;
    }

    #chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 8px 12px;
      font-family: inherit;
      resize: none;
      height: 40px;
      line-height: 24px;
    }

    #chat-input:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    #chat-input::placeholder {
      color: #555;
    }

    #send-btn {
      padding: 8px 16px;
      background: #2d2d4e;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: #3d3d6e;
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 右ペイン: プレビュー */
    #preview-pane {
      display: flex;
      flex-direction: column;
      background: #0d0d1a;
    }

    #preview-header {
      padding: 10px 20px;
      border-bottom: 1px solid #2d2d4e;
      font-size: 12px;
      color: #555;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #preview-status {
      color: #a0c4ff;
    }

    #export-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .export-btn {
      background: transparent;
      color: #a0c4ff;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .export-btn:hover {
      background: rgba(160, 196, 255, 0.1);
      border-color: #a0c4ff;
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #preview-iframe {
      flex: 1 1 auto;
      width: 100%;
      min-height: 0; /* flex item の auto min-height で iframe が content 高さに膨らむのを防ぐ */
      height: 100%;
      border: none;
      background: #191919;
    }

    #preview-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      gap: 16px;
    }

    #preview-empty h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 4px;
      margin: 0;
      color: #2d2d4e;
    }

    #preview-empty p {
      font-size: 14px;
      color: #444;
      margin: 0;
    }

    /* API キー入力モーダル (T010) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 26, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 24px 28px;
      width: 420px;
      max-width: calc(100% - 48px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #a0c4ff;
    }

    .modal-desc {
      margin: 0;
      font-size: 13px;
      color: #aab1bf;
      line-height: 1.6;
    }

    .modal input[type="password"] {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .modal input[type="password"]:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    .modal-error {
      font-size: 13px;
      color: #ff8080;
      background: #4a1a1a;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .modal-error.hidden {
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-primary {
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:disabled {
      background: #2d2d4e;
      color: #555;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: rgba(160, 196, 255, 0.1);
    }

    @media (prefers-color-scheme: light) {
      html, body { background: #f0f4f8; color: #1a1a2e; }
      #chat-pane { background: #ffffff; border-right-color: #ddd; }
      #chat-header { color: #4a90d9; }
      .message.user { background: #dbeafe; color: #1e3a5f; }
      .message.assistant { background: #f3f4f6; color: #1a1a2e; }
      #seed-input, #chat-input { background: #f9fafb; border-color: #ddd; color: #1a1a2e; }
      #seed-input::placeholder, #chat-input::placeholder { color: #aaa; }
      #chat-header, #seed-area, #chat-input-area { border-color: #ddd; }
      #preview-pane { background: #e8edf2; }
      #preview-header { border-color: #ddd; color: #888; }
      #preview-empty h1 { color: #ccd5e0; }
      .block-tool-status { background: rgba(0, 0, 0, 0.04); color: #555; }
      details.block-reasoning > .reasoning-text { background: rgba(74, 144, 217, 0.08); color: #555; }
      .permission-prompt { background: #fff7e0; color: #5a3d0e; border-color: #d99e2b; }
      .permission-prompt button { color: #5a3d0e; border-color: #d99e2b; }
      .permission-prompt button[data-action="allow"] { background: #ffd166; color: #1a1a2e; }
      #chat-tabs { border-bottom-color: #ddd; }
      .tab-btn { color: #888; }
      .tab-btn:hover, .tab-btn.active { color: #4a90d9; }
      .tab-btn.active { border-bottom-color: #4a90d9; }
      #seed-display { background: #f9fafb; color: #1a1a2e; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat-pane" data-active-tab="chat">
      <div id="chat-header">
        <span id="chat-header-title">sl<span style="color:#ff6b6b">AI</span>do</span>
        <span id="dev-indicator">DEV</span>
        <button id="api-key-reset-link" class="chat-header-link" type="button">
          API キーを再設定
        </button>
      </div>

      <div id="chat-tabs">
        <button class="tab-btn active" data-tab="chat" type="button">チャット</button>
        <button class="tab-btn" data-tab="seed" type="button">シード</button>
      </div>

      <div id="chat-messages"></div>

      <div id="seed-display"></div>

      <div id="dev-raw-trail">
        <div id="dev-raw-trail-title">RAW EVENTS</div>
        <div id="dev-raw-trail-list"></div>
      </div>

      <div id="interview-pane">
        <div class="interview-progress" id="interview-progress"></div>
        <div class="interview-history" id="interview-history"></div>
        <div class="interview-question" id="interview-question"></div>
        <div class="interview-error hidden" id="interview-error"></div>
        <textarea id="interview-answer-input" placeholder="回答を入力してください..."></textarea>
        <div class="interview-actions">
          <button id="interview-answer-submit" type="button">送信して次の質問へ</button>
          <button id="interview-cancel-btn" type="button">中断</button>
        </div>
      </div>

      <div id="rubric-edit-pane">
        <div class="rubric-edit-title">このスライドの前提条件 (rubric)</div>
        <div class="rubric-edit-desc">
          編集してから「このまま生成」を押すか、「保存して再利用」で次回以降に流用できます。
        </div>
        <div id="rubric-edit-form"></div>
        <details class="rubric-history">
          <summary>インタビュー履歴を見る</summary>
          <div class="rubric-history-list" id="rubric-history-list"></div>
        </details>
        <div class="rubric-actions">
          <button id="rubric-generate-btn" type="button">このまま生成</button>
          <button id="rubric-save-and-generate-btn" type="button">保存して再利用</button>
          <button id="rubric-cancel-btn" type="button">破棄</button>
        </div>
      </div>

      <div id="seed-area">
        <div id="seed-label">シードドキュメント</div>
        <div id="preset-select-wrap" class="hidden">
          <span>過去の rubric を流用</span>
          <select id="preset-select">
            <option value="">— 選択しない —</option>
          </select>
        </div>
        <textarea id="seed-input" placeholder="ドキュメント、アウトライン、メモなどを貼り付けてください..."></textarea>
        <button id="generate-btn">スライドを生成</button>
        <button id="generate-skip-link" type="button">インタビューをスキップして生成</button>
      </div>

      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="修正を指示... (Enter で送信、Shift+Enter で改行)"></textarea>
        <button id="send-btn">送信</button>
        <button id="abort-btn" type="button" hidden>中断</button>
      </div>
    </div>

    <div id="preview-pane">
      <div id="preview-header">
        プレビュー <span id="preview-status"></span>
        <div id="export-actions">
          <button id="export-pdf-btn" class="export-btn" type="button">PDF として保存</button>
          <button id="export-html-zip-btn" class="export-btn" type="button">HTML として書き出し</button>
        </div>
      </div>
      <div id="preview-empty">
        <h1>slAIdo</h1>
        <p>スライドを生成するとここにプレビューが表示されます</p>
      </div>
      <iframe id="preview-iframe" style="display:none;" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
    </div>
  </div>

  <div id="api-key-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="api-key-modal-title">
      <h2 id="api-key-modal-title">OpenRouter API キーを入力</h2>
      <p class="modal-desc">
        slAIdo は OpenRouter 経由で LLM を呼び出します。
        お持ちでない場合は下のボタンから取得できます。
      </p>
      <input id="api-key-input" type="password" autocomplete="off" placeholder="sk-or-v1-..." />
      <div id="api-key-error" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button id="api-key-signup-btn" class="btn-secondary" type="button">
          OpenRouter にサインアップ
        </button>
        <button id="api-key-submit-btn" class="btn-primary" type="button" disabled>
          保存して続行
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="views://mainview/index.js"></script>
</body>
</html>
