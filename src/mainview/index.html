<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>slAIdo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    #app {
      display: grid;
      grid-template-columns: 360px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* 左ペイン: チャット */
    #chat-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #2d2d4e;
      background: #16213e;
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #2d2d4e;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #a0c4ff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    #chat-header-title {
      flex: 1;
    }

    .chat-header-link {
      margin-left: auto;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0;
      color: #888;
      text-decoration: underline;
      cursor: pointer;
      background: transparent;
      border: none;
      padding: 4px 6px;
      font-family: inherit;
    }

    .chat-header-link:hover {
      color: #a0c4ff;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
    }

    .message.user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      background: #2d2d4e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.error {
      background: #4a1a1a;
      color: #ff8080;
      align-self: stretch;
    }

    #seed-area {
      padding: 12px 16px;
      border-top: 1px solid #2d2d4e;
      flex-shrink: 0;
    }

    #seed-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #seed-input {
      width: 100%;
      height: 80px;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      padding: 8px 12px;
      resize: none;
      font-family: inherit;
    }

    #seed-input:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    #seed-input::placeholder {
      color: #555;
    }

    #generate-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #generate-btn:hover {
      background: #bfd7ff;
    }

    #generate-btn:disabled {
      background: #2d2d4e;
      color: #555;
      cursor: not-allowed;
    }

    #chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #2d2d4e;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 8px 12px;
      font-family: inherit;
      resize: none;
      height: 40px;
      line-height: 24px;
    }

    #chat-input:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    #chat-input::placeholder {
      color: #555;
    }

    #send-btn {
      padding: 8px 16px;
      background: #2d2d4e;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: #3d3d6e;
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 右ペイン: プレビュー */
    #preview-pane {
      display: flex;
      flex-direction: column;
      background: #0d0d1a;
    }

    #preview-header {
      padding: 10px 20px;
      border-bottom: 1px solid #2d2d4e;
      font-size: 12px;
      color: #555;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #preview-status {
      color: #a0c4ff;
    }

    #export-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .export-btn {
      background: transparent;
      color: #a0c4ff;
      border: 1px solid #2d2d4e;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .export-btn:hover {
      background: rgba(160, 196, 255, 0.1);
      border-color: #a0c4ff;
    }

    .export-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #preview-iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    #preview-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      gap: 16px;
    }

    #preview-empty h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 4px;
      margin: 0;
      color: #2d2d4e;
    }

    #preview-empty p {
      font-size: 14px;
      color: #444;
      margin: 0;
    }

    /* API キー入力モーダル (T010) */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 26, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal {
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #2d2d4e;
      border-radius: 12px;
      padding: 24px 28px;
      width: 420px;
      max-width: calc(100% - 48px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #a0c4ff;
    }

    .modal-desc {
      margin: 0;
      font-size: 13px;
      color: #aab1bf;
      line-height: 1.6;
    }

    .modal input[type="password"] {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      padding: 10px 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .modal input[type="password"]:focus {
      outline: none;
      border-color: #a0c4ff;
    }

    .modal-error {
      font-size: 13px;
      color: #ff8080;
      background: #4a1a1a;
      border-radius: 8px;
      padding: 8px 12px;
    }

    .modal-error.hidden {
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .btn-primary {
      background: #a0c4ff;
      color: #0d0d1a;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary:disabled {
      background: #2d2d4e;
      color: #555;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #a0c4ff;
      border: 1px solid #a0c4ff;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: rgba(160, 196, 255, 0.1);
    }

    @media (prefers-color-scheme: light) {
      html, body { background: #f0f4f8; color: #1a1a2e; }
      #chat-pane { background: #ffffff; border-right-color: #ddd; }
      #chat-header { color: #4a90d9; }
      .message.user { background: #dbeafe; color: #1e3a5f; }
      .message.assistant { background: #f3f4f6; color: #1a1a2e; }
      #seed-input, #chat-input { background: #f9fafb; border-color: #ddd; color: #1a1a2e; }
      #seed-input::placeholder, #chat-input::placeholder { color: #aaa; }
      #chat-header, #seed-area, #chat-input-area { border-color: #ddd; }
      #preview-pane { background: #e8edf2; }
      #preview-header { border-color: #ddd; color: #888; }
      #preview-empty h1 { color: #ccd5e0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat-pane">
      <div id="chat-header">
        <span id="chat-header-title">sl<span style="color:#ff6b6b">AI</span>do</span>
        <button id="api-key-reset-link" class="chat-header-link" type="button">
          API キーを再設定
        </button>
      </div>

      <div id="chat-messages">
        <div class="message assistant">こんにちは！スライドを作成するドキュメントやアウトラインを下の入力欄に貼り付けてください。</div>
      </div>

      <div id="seed-area">
        <div id="seed-label">シードドキュメント</div>
        <textarea id="seed-input" placeholder="ドキュメント、アウトライン、メモなどを貼り付けてください..."></textarea>
        <button id="generate-btn">スライドを生成</button>
      </div>

      <div id="chat-input-area">
        <textarea id="chat-input" placeholder="修正を指示... (Enter で送信)"></textarea>
        <button id="send-btn">送信</button>
      </div>
    </div>

    <div id="preview-pane">
      <div id="preview-header">
        プレビュー <span id="preview-status"></span>
        <div id="export-actions">
          <button id="export-pdf-btn" class="export-btn" type="button">PDF として保存</button>
          <button id="export-html-zip-btn" class="export-btn" type="button">HTML として書き出し</button>
        </div>
      </div>
      <div id="preview-empty">
        <h1>slAIdo</h1>
        <p>スライドを生成するとここにプレビューが表示されます</p>
      </div>
      <iframe id="preview-iframe" style="display:none;" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <div id="api-key-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="api-key-modal-title">
      <h2 id="api-key-modal-title">OpenRouter API キーを入力</h2>
      <p class="modal-desc">
        slAIdo は OpenRouter 経由で LLM を呼び出します。
        お持ちでない場合は下のボタンから取得できます。
      </p>
      <input id="api-key-input" type="password" autocomplete="off" placeholder="sk-or-v1-..." />
      <div id="api-key-error" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button id="api-key-signup-btn" class="btn-secondary" type="button">
          OpenRouter にサインアップ
        </button>
        <button id="api-key-submit-btn" class="btn-primary" type="button" disabled>
          保存して続行
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="views://mainview/index.js"></script>
</body>
</html>
