name: Build and Release

# tag push (v*.*.*) で macos-14 runner 上で署名・公証ビルドを実行し、
# zip / dmg を GitHub Release に自動添付する。
# workflow_dispatch 起動時は release を作らず actions/upload-artifact で
# 7 日保持する dry-run モードとして動く。
#
# 詳細設計: docs/release-automation.md / .team/tasks/018-... の plan.md を参照。
# 触らないもの:
#   - .github/workflows/update-tap.yml (Homebrew Cask 自動更新)
#   - electrobun.config.ts / fastlane/Fastfile / scripts/package.sh, smoke-test.sh
#   - .claude/commands/release.md (手動フォールバック用に保持)
#
# 必要 Secrets (詳細は docs/release-automation.md §4):
#   KEYCHAIN_PASSWORD
#   DEVELOPER_ID_P12_BASE64 / DEVELOPER_ID_P12_PASSWORD
#   ELECTROBUN_DEVELOPER_ID
#   APP_STORE_CONNECT_API_KEY_KEY_ID / _ISSUER_ID / _KEY

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: write

# 同一 tag 再 push / dispatch 連打への排他。release 中の cancel は中途半端な
# release を残しうるため cancel-in-progress: false。
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve VERSION
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::VERSION resolution failed"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved VERSION=$VERSION"

      # Gemfile を持たない方針 (docs/signing-setup.md §5) に揃え、
      # bundle exec ではなく fastlane を直接呼ぶ。
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Verify fastlane availability
        run: |
          set -euo pipefail
          which fastlane || gem install fastlane --no-document
          fastlane --version

      # 一時 keychain を作成して .p12 を import する。
      # ポイント:
      #   - create → set-keychain-settings -lut → unlock → list-keychains -s
      #     → default-keychain -s → import → set-key-partition-list の順序を厳守
      #     (順序違反は codesign が UI prompt で hang する)
      #   - set-key-partition-list -S apple-tool:,apple:,codesign: 漏れは
      #     Phase 2 で最も多い踏み抜きポイント
      #   - p12 は RUNNER_TEMP に置いて使ったら即 rm
      - name: Create temporary keychain & import certificate
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          P12_PATH="$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # 既存 search-list を保ったまま追加 (runner 既定 keychain を壊さない)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"

          echo -n "$P12_BASE64" | base64 -d > "$P12_PATH"

          security import "$P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          rm -f "$P12_PATH"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # slaido は src/ をユニット、tests/e2e/ を別系統で扱う (package.json 参照)。
      # CI では src/ のみ実行し e2e は対象外（runner 環境で AppleScript / Window
      # 起動を要するため）。
      - name: Run unit tests
        run: bun test src/

      # Electrobun が helper / launcher / framework / dmg まで deep に codesign する。
      # default-keychain にしてあるので codesign 子プロセスがそのまま参照できる。
      # build:prod は内部で `bun install && bun run fetchOpencode && electrobun build --env=stable`
      # を実行する。fetchOpencode (scripts/fetch-opencode.ts) が opencode バイナリを
      # bin/{darwin-arm64,darwin-x64}/opencode に配置する。ネットワーク失敗時は
      # workflow の re-run で復旧する (docs/release-automation.md §6 参照)。
      - name: Build (codesign)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
        run: bun run build:prod

      # APP_STORE_CONNECT_API_KEY_KEY は PEM 改行を保持したまま env で渡す。
      # echo 等で再エンコードしない (改行が \n 文字列に潰れる事故を防ぐ)。
      # fastlane の app_store_connect_api_key action が tempfile 化して
      # notarize / xcrun notarytool に渡す。keychain には依存しない。
      - name: Notarize app & dmg
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        timeout-minutes: 25
        run: |
          set -euo pipefail
          fastlane mac notarize_app

      - name: Package zip & dmg
        run: bash scripts/package.sh "${{ steps.version.outputs.version }}"

      # spctl --assess で「Notarized Developer ID」検出 + codesign --verify
      # + stapler validate + 起動ログ確認まで通る。失敗で exit 1。
      - name: Smoke test
        run: bash scripts/smoke-test.sh build/stable-macos-arm64/slAIdo.app

      # tag push 時のみ release を作成。既存 release との衝突は upload --clobber で吸収
      # (CI 二重起動 / retry 時の冪等性確保)。draft / prerelease は使わない
      # (publish しないと update-tap.yml の Homebrew Cask 更新が発火しないため)。
      # update-tap.yml は workflow_run trigger で本 workflow の完了を検知して
      # 起動するため、release イベントを他 workflow に伝播させる必要は無く
      # GITHUB_TOKEN で十分。
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets with --clobber"
            gh release upload "$TAG" \
              "dist/slAIdo-v${VERSION}-macos-arm64.zip" \
              "dist/slAIdo-v${VERSION}-macos-arm64.dmg" \
              --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated release for $TAG. See CHANGELOG / commits for details." \
              --verify-tag \
              "dist/slAIdo-v${VERSION}-macos-arm64.zip" \
              "dist/slAIdo-v${VERSION}-macos-arm64.dmg"
          fi

      # workflow_dispatch (dry-run) では release を作らず artifact として 7 日保持。
      - name: Upload artifacts (dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: slAIdo-v${{ steps.version.outputs.version }}-macos-arm64
          path: |
            dist/slAIdo-v*-macos-arm64.zip
            dist/slAIdo-v*-macos-arm64.dmg
          retention-days: 7
          if-no-files-found: error

      # 失敗時にも keychain を残さない (defense in depth)。
      # KEYCHAIN_PATH 未設定 (早期失敗時) でも fail しないよう guard し、
      # 個別失敗は || true で無視する。
      - name: Cleanup keychain
        if: always()
        run: |
          set +e
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          security default-keychain -s ~/Library/Keychains/login.keychain-db || true
          exit 0
